name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ghcr.io/${{ github.repository }}/backend:latest
          docker pull ghcr.io/${{ github.repository }}/frontend:latest

      - name: Deploy info
        run: |
          echo "Deploying to: ${{ github.event.inputs.environment }}"
          echo "Backend image: ghcr.io/${{ github.repository }}/backend:latest"
          echo "Frontend image: ghcr.io/${{ github.repository }}/frontend:latest"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "To deploy on a server, configure SSH secrets and run:"
          echo "  docker compose pull && docker compose up -d"
